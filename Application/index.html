<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</head>

<body>
    
   <nav class="navbar">
  <div class="container-fluid align-items-center">

    <a class="navbar-brand d-flex flex-column align-items-center" href="#">
      <img src="Images/Logo.png" alt="Logo" width="100" height="77" class="d-inline-block">
      <span class="YoYo-Yeovil">YoYo-Yeovil</span>
    </a>

    <form class="d-flex align-items-center search-group">
      <input type="text" class="search-bar" placeholder="Search" aria-label="Search">
      <button class="input-group-text search-btn" type="submit">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </form>

    <button type="button" class="btn btn-outline-primary">User Profile</button>

  </div>
</nav>


    <main>

        <div class="items-container">
        <h2 class="items-title">ITEMS LIST</h2>

        <div class="items-grid">

        <div class="item-box">Fruits</div>
        <div class="item-box">Veggies</div>
        <div class="item-box">Diary Products</div>
        <div class="item-box">Bakery</div>
        <div class="item-box">General Products</div>

        <div class="btn-group" role="group" aria-label="Large button group">

            <button type="button" class="btn btn-outline-primary">Discount</button>
            <button type="button" class="btn btn-outline-primary">Remove Item</button>
            <button type="button" class="btn btn-outline-primary">Clear</button>

        </div>
        
        <br>

            <div class="btn-group" role="group" aria-label="Large button group">

            <button type="button" class="btn btn-outline-primary">Checkout</button>
            <button type="button" class="btn btn-outline-primary">Print Recei</button>

        </div>

    </main>

</body>

<footer>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

                    <div class="navbar-nav">

                        <a class="nav-link active" aria-current="page" href="#">Inventory</a>
                        <a class="nav-link active" aria-current="page" href="#">Reports</a>
                        <a class="nav-link active" aria-current="page" href="#">Settings</a>
                        <a class="nav-link active" aria-current="page" href="#">Transactions</a>

                    </div>

                </div>
  </div>
</nav>

</footer>

</html>
