<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</head>

<body>
    
   <nav class="navbar">
        <div class="container-fluid align-items-center">

            <a class="navbar-brand d-flex flex-column align-items-center" href="#">
            <img src="Images/Logo.png" alt="Logo" width="100" height="77" class="d-inline-block">
            <span class="YoYo-Yeovil">YoYo-Yeovil</span>
            </a>

            <form class="d-flex align-items-center search-group">
            <input type="text" class="search-bar" placeholder="Search" aria-label="Search">
            <button class="input-group-text search-btn" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            </form>

            <button type="button" class="btn btn-outline-primary">User Profile</button>

        </div>
</nav>


    <main>

        <div class="container-fluid mt-4">

    <div class="row">

        <!-- ITEMS -->
        <div class="col-md-8">
            <h3>ITEMS LIST</h3>

            <div class="items-grid">
                <div class="item-box" tabindex="0">Apple - £1.80</div>
                <div class="item-box" tabindex="0">Banana - £1.50</div>
                <div class="item-box" tabindex="0">Milk - £1.60</div>

            </div>
        </div>

        <!-- RECEIPT -->
        <div class="col-md-4">
            <div class="receipt">

                <h4>Receipt</h4>

                <ul id="receiptItems" class="list-group mb-3"></ul>

                <p>Sub Total: <span id="subTotal">£0.00</span></p>
                <p>VAT: <span id="vat">£0.00</span></p>
                <p><strong>Total: <span id="total">£0.00</span></strong></p>

                <button class="btn btn-danger w-100 mb-2" onclick="removeSelectedItem()">Remove Item</button>
                <button class="btn btn-secondary w-100 mb-2" onclick="clearReceipt()">Clear</button>
                <button class="btn btn-success w-100" onclick="checkout()">Checkout</button>

            </div>
        </div>

    </div>
</div>

    </main>

</body>

<footer>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

                    <div class="navbar-nav">

                        <a class="nav-link active" aria-current="page" href="#">Inventory</a>
                        <a class="nav-link active" aria-current="page" href="#">Reports</a>
                        <a class="nav-link active" aria-current="page" href="#">Settings</a>
                        <a class="nav-link active" aria-current="page" href="#">Transactions</a>

                    </div>

                </div>
  </div>
</nav>

</footer>

</html>
